    <title>Isolade</title>
    <!-- Apply the persisted theme's mode + background before first paint to
         avoid a flash. Full token overrides are applied by initTheme() once
         the app module loads. Keep in sync with lib/settings.ts. -->
    <script>
      (function () {
        try {
          var boot = JSON.parse(
            localStorage.getItem("isolade.themeBoot") || "null",
          );
          var mode = (boot && boot.mode) || "dark";
          var background = (boot && boot.background) || "#0d1117";
          var root = document.documentElement;
          if (mode === "dark") root.classList.add("dark");
          root.style.colorScheme = mode;
          root.style.backgroundColor = background;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
